<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1: Multi-Break Grid</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .lab-header { background: #0d6efd; color: white; padding: 2rem 0; margin-bottom: 2rem; }
        .grid-box {
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 5px;
            padding: 20px;
            text-align: center;
            margin-bottom: 1rem;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- Semantic Header -->
    <header class="lab-header text-center">
        <div class="container">
            <h1>Lab 1: Multi-Break Grid</h1>
        </div>
    </header>

    <!-- Semantic Main Content -->
    <main class="container">
        <div class="row">
            <!-- These columns change size based on screen width -->
            <div class="col-12 col-md-4"><div class="grid-box">Box 1</div></div>
            <div class="col-12 col-md-4"><div class="grid-box">Box 2</div></div>
            <div class="col-12 col-md-4"><div class="grid-box">Box 3</div></div>
        </div>
    </main>

</body>
</html>
